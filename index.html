<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="top">
        <h1>To-Do List</h1>

        <div id="add-task-bar">
            <input id="task-input" placeholder="New task (use #tags)">
            <button id="add-task-btn">Add Task</button>
        </div>
    </div>

    <div id="main">
        <div class="column" id="todo"><h3>Not Started</h3></div>
        <div class="column" id="in-progress"><h3>In Progress</h3></div>
        <div class="column" id="done"><h3>Done</h3></div>
    </div>

    <!-- GLOBAL MODAL -->
    <div id="global-modal" class="modal">
        <div class="modal-content">
            <span id="modal-close" class="close">&times;</span>
            <h3 id="modal-title"></h3>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
