<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="top">
        <h1>To-Do List</h1>

        <div id="add-task-bar">
            <input id="task-input" placeholder="New task (use #tags)">
            <button id="add-task-btn">Add Task</button>
        </div>
    </div>

    <div id="main">
        <div class="column" id="todo">
            <h3>Not Started</h3>
        </div>
        <div class="column" id="in-progress">
            <div class="column-header">
                <h3>In Progress</h3>
                <p id="WIP_MAX">0/3</p>
            </div>
        </div>
        <div class="column" id="done">
            <h3>Done</h3>
        </div>
    </div>

    <!-- GLOBAL MODAL -->
    <div id="global-modal" class="modal">
        <div class="modal-content">

            <span id="modal-close" class="close">&times;</span>

            <input id="modal-title-input" class="modal-title-input">

            <h4>Description</h4>
            <textarea id="modal-description" placeholder="Task description..."></textarea>

            <h4>Tags</h4>
            <input id="modal-tags" placeholder="#frontend #urgent">

            <h4>Subtasks</h4>

            <div id="subtask-list"></div>

            <div class="subtask-add">
                <input id="new-subtask-input" placeholder="New subtask...">
                <button id="add-subtask-btn">Add</button>
            </div>

            <button id="save-task-btn">Save Task</button>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
